name: CI

on:
  push:
    branches: [main, feature-product-evolution]
  pull_request:
    branches: [main]

jobs:
  dotnet-tests:
    name: .NET
    uses: ./.github/workflows/reusable-dotnet-tests.yml

  angular-tests:
    name: Angular
    uses: ./.github/workflows/reusable-angular-tests.yml

  # ── Playwright E2E ─────────────────────────────────────────────────────────
  # continue-on-error here (PR-facing, fast non-blocking feedback) — cd.yml's own copy of
  # this job does NOT set continue-on-error, since deploying on a known-broken E2E suite
  # would defeat the point of having it.
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: angular-tests
    continue-on-error: true

    defaults:
      run:
        working-directory: bus-booking-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: bus-booking-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: bus-booking-ui/playwright-report/
          retention-days: 7
