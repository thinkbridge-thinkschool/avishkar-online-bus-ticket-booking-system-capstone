name: Reusable — Angular Build & Tests

on:
  workflow_call:

jobs:
  angular-tests:
    name: Angular Build & Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bus-booking-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: bus-booking-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npx ng build --configuration production

      - name: Run Karma unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Upload Angular coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: angular-coverage
          path: bus-booking-ui/coverage/

      # Hard gate — npm audit's exit code is already meaningful, no output-parsing needed.
      # Fails the job the moment a high/critical-severity dependency is introduced, rather
      # than waiting for Dependabot's next weekly scan.
      - name: npm audit (high severity and above)
        run: npm audit --audit-level=high
