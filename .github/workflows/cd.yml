name: CD

# Push to main only — never on pull_request, so a fork PR can never reach the deploy job's
# credentials. Reuses the exact same test jobs as ci.yml (see reusable-*.yml) so "green CD"
# means the identical tests that gated the PR passed again on main.
on:
  push:
    branches: [main]

jobs:
  dotnet-tests:
    name: .NET
    uses: ./.github/workflows/reusable-dotnet-tests.yml

  angular-tests:
    name: Angular
    uses: ./.github/workflows/reusable-angular-tests.yml

  # Unlike ci.yml's copy, this one is NOT continue-on-error — deploying on top of a
  # known-broken E2E suite would defeat the entire point of having it as a deploy gate.
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: angular-tests

    defaults:
      run:
        working-directory: bus-booking-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: bus-booking-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: bus-booking-ui/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy (azd)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, angular-tests, e2e-tests]
    # GitHub Environment with required reviewers configured (Settings → Environments →
    # production) is what actually pauses this job for manual approval — no extra workflow
    # code needed beyond referencing the environment here.
    environment: production
    permissions:
      id-token: write # required for OIDC federated login — no stored secret
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC — no client secret)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # azd picks up the az CLI's already-authenticated session above rather than
      # re-authenticating itself, consistent with azd's documented GitHub Actions pattern.
      - name: azd provision + deploy
        run: |
          azd env refresh --no-prompt
          azd provision --no-prompt
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: prod
