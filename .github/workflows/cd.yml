name: CD

# Push to main only — never on pull_request, so a fork PR can never reach the deploy job's
# credentials. Reuses the exact same test jobs as ci.yml (see reusable-*.yml) so "green CD"
# means the identical tests that gated the PR passed again on main.
on:
  push:
    branches: [main]

jobs:
  dotnet-tests:
    name: .NET
    uses: ./.github/workflows/reusable-dotnet-tests.yml

  angular-tests:
    name: Angular
    uses: ./.github/workflows/reusable-angular-tests.yml

  # Unlike ci.yml's copy, this one is NOT continue-on-error — deploying on top of a
  # known-broken E2E suite would defeat the entire point of having it as a deploy gate.
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: angular-tests

    defaults:
      run:
        working-directory: bus-booking-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: bus-booking-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: bus-booking-ui/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy (azd)
    runs-on: ubuntu-latest
    needs: [dotnet-tests, angular-tests, e2e-tests]
    # GitHub Environment with required reviewers configured (Settings → Environments →
    # production) is what actually pauses this job for manual approval — no extra workflow
    # code needed beyond referencing the environment here.
    environment: production
    permissions:
      id-token: write # required for OIDC federated login — no stored secret
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # azd maintains its own auth/token state, separate from the az CLI session
      # above — resolving bicep parameters like sqlAdminPrincipalId (azd's built-in
      # AZURE_PRINCIPAL_ID) requires azd itself to be logged in, not just az.
      - name: azd auth login (federated credential)
        run: azd auth login --client-id "$AZURE_CLIENT_ID" --federated-credential-provider github --tenant-id "$AZURE_TENANT_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: azd provision + deploy
        run: |
          azd env refresh --no-prompt
          # --no-state: CI starts from a stateless environment every run (no local .azure/
          # cache), so azd can't unambiguously resume against this stack's deployment
          # history (3 prior successful deployments exist here) without an interactive
          # prompt. This forces a fresh declarative deployment from the current Bicep
          # files instead — idempotent against the existing resources, not a recreate.
          azd provision --no-prompt --no-state
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: prod
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: rg-busbooking-prod
          AZURE_LOCATION: southeastasia
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # Public SPA client ID (already shipped in the committed Angular bundle) — not a secret.
          AAD_CLIENT_ID: 4f3daaf0-2022-4bb5-8648-c091dba6f9e1
          # Pinned to the existing SQL AAD admin (you), NOT the CI service principal, so this
          # provision run is a no-op against the live server instead of silently reassigning
          # SQL admin rights. See sql.bicep's sqlAdminPrincipalId/Name params.
          AZURE_PRINCIPAL_ID: 1fd0c50c-0880-48bd-bedf-8c334d2037ab
          AZURE_PRINCIPAL_NAME: "avishkarpatil071_gmail.com#EXT#@avishkarpatil071gmail.onmicrosoft.com"
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          # Matches the existing live namespace's SKU (Standard) — empty here resolves to
          # Premium for prod (main.bicep's default), which Azure rejects as an in-place
          # upgrade attempt on the existing Standard namespace. Not a secret, just a SKU name.
          SERVICE_BUS_SKU_OVERRIDE: Standard
