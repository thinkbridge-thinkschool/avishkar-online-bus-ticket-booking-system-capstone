<div class="simple-wrapper">
  <div class="simple-card">
    <a routerLink="/" class="brand">
      <span>🚌</span> <span>BusBooking</span>
    </a>

    @if (sent()) {
      <div class="status-icon" aria-hidden="true">📬</div>
      <h2>Check your inbox</h2>
      <p>If an account with that email exists, we've sent a reset link. It expires in 2 hours.</p>
      <a routerLink="/login" class="cta-btn">Back to sign in</a>
    } @else {
      <h2>Forgot password?</h2>
      <p class="sub">Enter your email and we'll send a reset link if an account exists.</p>

      <form (ngSubmit)="submit()" #fpForm="ngForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            email
            autocomplete="email"
            placeholder="you@example.com"
            [disabled]="loading()"
          />
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading() || !email">
          @if (loading()) {
            <span class="spinner" aria-hidden="true"></span> Sending…
          } @else {
            Send reset link
          }
        </button>
      </form>

      <p class="alt-link"><a routerLink="/login">Back to sign in</a></p>
    }
  </div>
</div>
